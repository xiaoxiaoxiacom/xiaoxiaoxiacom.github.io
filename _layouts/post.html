---
layout: default
---

<article>
  <h1>{{ page.title }}</h1>
  <div class="post-meta">
    {{ page.date | date: "%Y年%m月%d日 %H:%M" }} · 作者: {{ page.author | default: site.author }}
  </div>
  <div class="post-content">
    {{ content }}
  </div>
</article>

<div style="margin-top: 30px;">
  <a href="{{ '/' | relative_url }}">← 返回首页</a>
</div>
